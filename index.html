<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Space Shooter</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a1a;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #loading {
        color: #ccc;
        font-size: 18px;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading Space Shooter...</div>

    <script type="module">
      import init from "./space_shooter.js";

      init()
        .then(() => {
          document.getElementById("loading").style.display = "none";
        })
        .catch((error) => {
          if (!error.message.startsWith("Using exceptions for control flow")) {
            throw error;
          }
        });
    </script>
  </body>
</html>

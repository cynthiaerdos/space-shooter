<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Space Shooter</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a1a;
        height: 100%;
        overflow: hidden;
        font-family: monospace;
        display: flex;
        flex-direction: column-reverse;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        color: #ccc;
      }

      .loading {
        background-color: #20204d;
        color: #ccc;
        font-size: 18px;
        width: 1280px;
        height: 720px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 16px;
      }

      canvas {
        display: block;
        border-radius: 16px;
      }

      canvas:focus {
        outline: none;
      }

      .controls {
        width: calc(1280px - 2 * 16px);
        justify-content: center;
        background-color: #20204d;
        padding: 16px;
        border-radius: 16px;
        overflow: hidden;
        color: #888;
        margin-top: 12px;
        display: flex;
        gap: 48px;
      }

      .controls span {
        color: #ccc;
        font-weight: bold;
      }

      .credits {
        margin-top: 12px;
      }

      .credits a {
        color: #8181d7;
        font-size: 16px;
        text-decoration: none;
      }

      .credits a:hover {
        color: #9090e0;
        text-decoration: underline;
      }

      .github-link svg {
        vertical-align: middle;
        position: relative;
        top: -2px;
      }
    </style>
  </head>
  <body>
    <div class="credits">
      <div class="credits">
        Art by <a href="https://anim86.itch.io" target="_blank">anim86</a> |
        <a
          href="https://github.com/cynthiaerdos/space-shooter"
          target="_blank"
          class="github-link"
          title="Source Code"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          Github
        </a>
        |
        <a href="./THIRD_PARTY_LICENSES.html" target="_blank"
          >Third party licenses</a
        >
      </div>
    </div>

    <div class="controls">
      <div><span>A / D</span> or <span>← / →</span> to Move</div>
      <div><span>Space</span> to Shoot</div>
    </div>

    <div class="loading">
      <div>
        <span class="loading-text"></span>
        <span class="loading-dots"></span>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loadingText = document.querySelector(".loading-text");
        const loadingDots = document.querySelector(".loading-dots");

        const messages = [
          "Fueling the spaceship",
          "Waking up the space bugs",
          "Bribing space traffic control",
          "Loading space ammunition",
          "Negotiating with asteroids",
          "Stretching before combat",
          "Defrosting the pilot",
          "Duct-taping the engine back on",
          "Updating space insurance policy",
          "Removing space cobwebs",
          "Counting every star... almost done",
          "Pretending to do a pre-flight check",
        ];

        let next = Math.floor(Math.random() * messages.length);
        let last = next;
        let dotCount = -1;

        loadingText.textContent = messages[next];

        const loadingUpdate = () => {
          dotCount++;

          if (dotCount > 3) {
            dotCount = 0;

            do {
              next = Math.floor(Math.random() * messages.length);
            } while (next === last);

            last = next;

            loadingText.textContent = messages[next];
          }

          loadingDots.textContent = ".".repeat(dotCount);
        };

        loadingUpdate();

        window.loadingInterval = setInterval(loadingUpdate, 500);
      });
    </script>

    <script type="module">
      import init from "./space_shooter.js";

      init()
        .then(() => {
          clearInterval(window.loadingInterval);
          document.querySelector(".loading").remove();
        })
        .catch((error) => {
          if (!error.message.startsWith("Using exceptions for control flow")) {
            throw error;
          }
        });
    </script>
  </body>
</html>
